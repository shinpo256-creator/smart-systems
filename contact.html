<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | スマートシステムズ合同会社</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-wrapper">
    <div class="back-to-home">
        <a href="../index.html" class="back-link">
    <span class="arrow"></span> <span class="text">ホームへ戻る</span>
        </a>
    </div>

    <h1 class="form-page-title">CONTACT</h1>

    <p class="form-intro">
        当社へのお問い合わせはこちらからお願いいたします。<br>
        下記に必要事項をご記入の上、お問い合わせ下さい。
    </p>

    <form action="#" method="post" id="contactForm" novalidate>
        <table class="custom-table">
    <tr>
        <th>貴社名</th>
        <td><input type="text" name="company"></td>
    </tr>
    <tr>
        <th>部署名</th>
        <td><input type="text" name="department"></td>
    </tr>
    <tr>
        <th class="required">氏名<sup>*</sup></th>
        <td>
            <input type="text" name="name" required placeholder="例）田中 太郎">
            <div class="error"></div>
        </td>
    </tr>
    <tr>
        <th class="required">メールアドレス<sup>*</sup></th>
        <td>
            <input type="email" name="email" required placeholder="例）example@example.com">
            <div class="error"></div>
        </td>
    </tr>
    <tr>
        <th class="required">電話番号<sup>*</sup></th>
        <td>
            <input type="tel" name="phone" required placeholder="例）090-1234-5678">
            <div class="error"></div>
        </td>
    </tr>
    <tr>
        <th class="required">郵便番号<sup>*</sup></th>
        <td>
            <input type="text" name="zipcode" required placeholder="例）123-4567" onKeyUp="AjaxZip3.zip2addr(this,'','prefecture','city');">
            <div class="error"></div>
        </td>
    </tr>
    <tr>
        <th class="required">都道府県<sup>*</sup></th>
        <td>
            <input type="text" name="prefecture" required placeholder="郵便番号から自動入力されます">
            <div class="error"></div>
        </td>
    </tr>
    <tr>
        <th class="required">市区町村<sup>*</sup></th>
        <td>
            <input type="text" name="city" required placeholder="例）渋谷区〇〇町">
            <div class="error"></div>
        </td>
    </tr>
    <tr>
        <th>建物名</th>
        <td>
            <input type="text" name="building" placeholder="例）〇〇マンション701号室">
        </td>
    </tr>
    <tr>
        <th class="required">お問い合わせ件名<sup>*</sup></th>
        <td>
            <input type="text" name="subject" required placeholder="例）サービスについて">
            <div class="error"></div>
        </td>
    </tr>
    <tr>
        <th class="required">お問い合わせ内容<sup>*</sup></th>
        <td>
            <textarea name="message" required rows="5" placeholder="ご自由にご記入ください"></textarea>
            <div class="error"></div>
        </td>
    </tr>
</table>

        <div class="form-submit-area">
            <button type="submit" class="fuwafuwa-btn">
                <span>送信する</span>
                <div class="btn-circle"></div>
            </button>
        </div>
    </form>
</div>

<script src="https://ajaxzip3.github.io/ajaxzip3.js" charset="UTF-8"></script>
<script src="js.js?v=123"></script>
</html>
